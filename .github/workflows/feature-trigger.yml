name: DevOps Trigger - Feature Development

on:
  repository_dispatch:
    types: 
      - azure-devops-feature
      - feature-trigger
  workflow_dispatch:

jobs:
  generate-feature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Set Feature Details
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            
            // Hardcoded test values (for testing without payload)
            const defaults = {
              workItemId: 108,
              featureTitle: 'User Authentication System',
              featureDescription: 'Implement OAuth2 authentication with JWT tokens'
            };

            let workItemId = payload.workItemId || defaults.workItemId;
            let featureTitle = payload.title || defaults.featureTitle;
            let featureDescription = payload.description || defaults.featureDescription;

            console.log('Work Item ID:', workItemId);
            console.log('Feature Title:', featureTitle);

            core.setOutput('work_item_id', workItemId);
            core.setOutput('feature_title', featureTitle);
            core.setOutput('feature_description', featureDescription);

            return workItemId;

      - name: Create GitHub Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const featureTitle = '${{ steps.extract.outputs.feature_title }}';
            const featureDescription = '${{ steps.extract.outputs.feature_description }}';

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Feature: ${featureTitle} (WI #${workItemId})`,
              body: `## 🚀 Feature Development
                        
            **Work Item:** #${workItemId}
            **Title:** ${featureTitle}
            **Description:** ${featureDescription}

            ### What will happen:
            1. Feature branch created
            2. Draft PR created
            3. Copilot AI implements the feature
            4. PR ready for review`,
              labels: ['feature-development','copilot-agent']
            });

            core.setOutput('issue_number', issue.data.number);
            console.log('Created issue #', issue.data.number);

            // Assign Copilot coding agent using the correct API
            try {
              // Use raw request to include agent_assignment parameter
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${context.repo.owner}/${context.repo.repo}`,
                  base_branch: 'master',
                  custom_instructions: `Implement this feature: ${featureTitle}\n\nDescription: ${featureDescription}`,
                  custom_agent: '',
                  model: ''
                }
              });
              console.log('✅ Assigned copilot-swe-agent[bot] to issue #' + issue.data.number);
              console.log('🚀 Copilot coding agent will now start working on the feature!');
            } catch (error) {
              console.error('❌ Failed to assign Copilot coding agent:', error.message);
              console.log('Status:', error.status);
              // Don't throw - continue with workflow
            }

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = '${{ steps.create-issue.outputs.issue_number }}';
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const featureTitle = '${{ steps.extract.outputs.feature_title }}';
            
            console.log('========================================');
            console.log('🎉 WORKFLOW COMPLETE');
            console.log('========================================');
            console.log(`Issue #${issueNumber} created for: ${featureTitle}`);
            console.log(`Work Item: WI-${workItemId}`);
            console.log('');
            console.log('🤖 Copilot coding agent has been assigned!');
            console.log('   - Copilot will create its own branch (copilot/...)');
            console.log('   - Copilot will implement the feature');
            console.log('   - Copilot will create a PR');
            console.log('   - Copilot will request your review when done');
            console.log('');
            console.log(`View issue: https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`);
            console.log('========================================');

