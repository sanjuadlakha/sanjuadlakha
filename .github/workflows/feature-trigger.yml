name: Generic Development Trigger - Copilot Agent

on:
  repository_dispatch:
    types: 
      - azure-devops-feature
      - feature-trigger
      - scratch-development
      - new-project
  workflow_dispatch:

jobs:
  generate-feature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Set Development Details
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            
            // All data comes from PowerShell script payload - no hardcoded defaults
            const workItemId = payload.workItemId || 'N/A';
            const projectTitle = payload.title || payload.projectTitle || 'Development Task';
            const projectDescription = payload.description || payload.projectDescription || 'Generic development task';
            const projectType = payload.type || payload.projectType || 'Feature';
            const techStack = payload.techStack || '';
            const customInstructions = payload.customInstructions || '';

            console.log('========================================');
            console.log('EXTRACTED DEVELOPMENT DETAILS:');
            console.log('========================================');
            console.log('Work Item ID:', workItemId);
            console.log('Project Title:', projectTitle);
            console.log('Project Type:', projectType);
            console.log('Tech Stack:', techStack);
            console.log('========================================');

            core.setOutput('work_item_id', workItemId);
            core.setOutput('project_title', projectTitle);
            core.setOutput('project_description', projectDescription);
            core.setOutput('project_type', projectType);
            core.setOutput('tech_stack', techStack);
            core.setOutput('custom_instructions', customInstructions);

            return workItemId;

      - name: Create GitHub Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const projectTitle = '${{ steps.extract.outputs.project_title }}';
            const projectDescription = `${{ steps.extract.outputs.project_description }}`.replace(/\r\n/g, '\n');
            const projectType = '${{ steps.extract.outputs.project_type }}';
            const techStack = '${{ steps.extract.outputs.tech_stack }}';
            const customInstructions = '${{ steps.extract.outputs.custom_instructions }}';

            // Determine emoji based on project type - use ASCII to avoid GitHub Actions issues
            const typeIcons = {
              'Feature': '[FEATURE]',
              'Bug Fix': '[BUG]', 
              'Enhancement': '[ENH]',
              'Scratch Development': '[NEW]',
              'Full Project': '[PROJECT]',
              'Refactor': '[REF]',
              'Documentation': '[DOC]',
              'Test': '[TEST]',
              'API': '[API]',
              'UI/UX': '[UI]',
              'Database': '[DB]'
            };
            const icon = typeIcons[projectType] || '[DEV]';

            let issueBody = `## ${icon} ${projectType} Development Request
                        
            **Work Item:** ${workItemId}
            **Title:** ${projectTitle}
            **Type:** ${projectType}`;

            if (techStack) {
              issueBody += `\n**Tech Stack:** ${techStack}`;
            }

            issueBody += `

            ---

            ${projectDescription}`;

            if (customInstructions) {
              issueBody += `

            ---

            ## Custom Instructions:
            ${customInstructions}`;
            }

            issueBody += `

            ---

            ### Copilot Agent Instructions:
            1. Analyze the requirements above
            2. Create appropriate project structure
            3. Implement with production-quality code
            4. Include comprehensive tests
            5. Add documentation and setup instructions
            
            **Note:** Copilot coding agent will automatically create a branch and PR with the implementation.`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${icon} ${projectTitle} (${projectType} - WI #${workItemId})`,
              body: issueBody,
              labels: [projectType.toLowerCase().replace(/\s+/g, '-'), 'copilot-agent']
            });

            core.setOutput('issue_number', issue.data.number);
            console.log('Created issue #', issue.data.number);

            // Assign Copilot coding agent using the correct API
            try {
              // Build comprehensive instructions from all inputs
              let copilotInstructions = `${projectType}: ${projectTitle}

            Description: ${projectDescription}`;

              if (techStack) {
                copilotInstructions += `\n\nTech Stack: ${techStack}`;
              }

              if (customInstructions) {
                copilotInstructions += `\n\nCustom Instructions: ${customInstructions}`;
              }

              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${context.repo.owner}/${context.repo.repo}`,
                  base_branch: 'master',
                  custom_instructions: copilotInstructions,
                  custom_agent: '',
                  model: ''
                }
              });
              console.log('[SUCCESS] Assigned copilot-swe-agent[bot] to issue #' + issue.data.number);
              console.log('[COPILOT] Coding agent will now start working!');
            } catch (error) {
              console.error('[ERROR] Failed to assign Copilot coding agent:', error.message);
              console.log('Status:', error.status);
              // Don't throw - continue with workflow
            }

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = '${{ steps.create-issue.outputs.issue_number }}';
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const projectTitle = '${{ steps.extract.outputs.project_title }}';
            const projectType = '${{ steps.extract.outputs.project_type }}';
            
            console.log('========================================');
            console.log('[SUCCESS] GENERIC WORKFLOW COMPLETE');
            console.log('========================================');
            console.log(`Issue #${issueNumber}: ${projectTitle}`);
            console.log(`Type: ${projectType}`);
            console.log(`Work Item: ${workItemId}`);
            console.log('');
            console.log('[COPILOT] Coding agent assigned!');
            console.log('   - Will analyze requirements');
            console.log('   - Will create appropriate structure');
            console.log('   - Will implement with best practices');
            console.log('   - Will create a PR for review');
            console.log('');
            console.log(`View: https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`);
            console.log('========================================');

