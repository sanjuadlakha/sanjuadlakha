name: DevOps Trigger - Feature Development

on:
  repository_dispatch:
    types: 
      - azure-devops-feature
      - feature-trigger
  workflow_dispatch:

jobs:
  generate-feature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and Set Feature Details
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            
            // Hardcoded test values (for testing without payload)
            const defaults = {
              workItemId: 108,
              featureTitle: 'User Authentication System',
              featureDescription: 'Implement OAuth2 authentication with JWT tokens'
            };

            let workItemId = payload.workItemId || defaults.workItemId;
            let featureTitle = payload.title || defaults.featureTitle;
            let featureDescription = payload.description || defaults.featureDescription;

            console.log('Work Item ID:', workItemId);
            console.log('Feature Title:', featureTitle);

            core.setOutput('work_item_id', workItemId);
            core.setOutput('feature_title', featureTitle);
            core.setOutput('feature_description', featureDescription);

            return workItemId;

      - name: Create GitHub Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const featureTitle = '${{ steps.extract.outputs.feature_title }}';
            const featureDescription = '${{ steps.extract.outputs.feature_description }}';

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Feature: ${featureTitle} (WI #${workItemId})`,
              body: `## 🚀 Feature Development
                        
            **Work Item:** #${workItemId}
            **Title:** ${featureTitle}
            **Description:** ${featureDescription}

            ### What will happen:
            1. Feature branch created
            2. Draft PR created
            3. Copilot AI implements the feature
            4. PR ready for review`,
              labels: ['feature-development','copilot-agent']
            });

            core.setOutput('issue_number', issue.data.number);
            console.log('Created issue #', issue.data.number);

            // Assign Copilot as assignee
            try {
              const assignResult = await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot[bot]']
              });
              console.log('✅ Assigned copilot[bot] to issue #' + issue.data.number);
              console.log('Assignees:', assignResult.data.assignees.map(a => a.login));
            } catch (error) {
              console.error('❌ Assignment failed:', error.message);
              console.error('Status:', error.status);
              throw error;
            }

      - name: Create Feature Branch
        id: create-files
        run: |
          WORK_ITEM_ID="${{ steps.extract.outputs.work_item_id }}"
          FEATURE_TITLE="${{ steps.extract.outputs.feature_title }}"
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="feature/WI-${WORK_ITEM_ID}-${TIMESTAMP}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin
          git checkout master || git checkout main
          git pull origin master || git pull origin main
          git checkout -b "$BRANCH_NAME"

          # Create feature structure
          mkdir -p src/features/WI-${WORK_ITEM_ID}/__tests__

          cat > "src/features/WI-${WORK_ITEM_ID}/index.js" << 'EOF'
          // Feature: ${FEATURE_TITLE}
          // Work Item: ${WORK_ITEM_ID}
          // TODO: Implement feature
          
          export default {};
          EOF

          cat > "src/features/WI-${WORK_ITEM_ID}/__tests__/index.test.js" << 'EOF'
          // Tests for ${FEATURE_TITLE}
          describe('Feature: ${FEATURE_TITLE}', () => {
            // TODO: Add tests
          });
          EOF

          git add .
          git commit -m "feat(WI-${WORK_ITEM_ID}): Initialize ${FEATURE_TITLE}"
          git push origin "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const featureTitle = '${{ steps.extract.outputs.feature_title }}';
            const branchName = '${{ steps.create-files.outputs.branch_name }}';
            const issueNumber = '${{ steps.create-issue.outputs.issue_number }}';

            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const baseBranch = repo.data.default_branch || 'master';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 ${featureTitle} (WI #${workItemId})`,
              head: branchName,
              base: baseBranch,
              body: `## Feature Implementation
                        
            Work Item: #${workItemId}
            Issue: #${issueNumber}`,
              draft: true
            });

            core.setOutput('pr_number', pr.data.number);
            console.log('PR created:', pr.data.number);

            // Assign Copilot to PR
            try {
              const assignResult = await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                assignees: ['copilot[bot]']
              });
              console.log('✅ Assigned copilot[bot] to PR #' + pr.data.number);
              console.log('Assignees:', assignResult.data.assignees.map(a => a.login));
            } catch (error) {
              console.error('❌ Assignment failed:', error.message);
              console.error('Status:', error.status);
              throw error;
            }

      - name: Trigger Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create-pr.outputs.pr_number }};
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            const featureTitle = '${{ steps.extract.outputs.feature_title }}';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `@copilot Implement this feature: **${featureTitle}**

            Please provide:
            1. Complete implementation code
            2. Unit tests (80%+ coverage)
            3. Documentation

            Files to update:
            - src/features/WI-${workItemId}/index.js
            - src/features/WI-${workItemId}/__tests__/index.test.js`
            });
            
            console.log('Copilot triggered on PR #' + prNumber);

