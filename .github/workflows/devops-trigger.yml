name: DevOps Trigger - Test Case Generation

on:
  repository_dispatch:
    types: 
      - azure-devops-workitem
      - azure-devops-workitem-created
      - devops-workitem-created
      - devops-test-trigger
  workflow_dispatch:
    inputs:
      workItemId:
        description: 'Work Item ID'
        required: true
      title:
        description: 'Work Item Title'
        required: true

jobs:
  generate-test-cases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Work Item Details
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload;
            console.log('Extracting work item details from payload...');

            let workItemId = payload?.workItemId ||
                             payload?.resource?.id ||
                             payload?.resource?.workItemId ||
                             payload?.original?.resource?.id;

            console.log('Extracted Work Item ID:', workItemId);
            core.setOutput('work_item_id', workItemId);

            return workItemId;

      - name: Create GitHub Issue to Trigger Copilot Agent
        id: create-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            // DEBUG: Log the entire payload structure
            console.log('======================================');
            console.log('FULL CONTEXT PAYLOAD:');
            console.log(JSON.stringify(context.payload, null, 2));
            console.log('======================================');

            const payload = context.payload.client_payload;

            console.log('CLIENT PAYLOAD:');
            console.log(JSON.stringify(payload, null, 2));
            console.log('======================================');

            // Extract work item details from Azure DevOps webhook payload
            // Support both simplified and full Azure DevOps payload structures

            // Try simplified structure first (for manual triggers)
            let workItemId = payload?.workItemId;
            let workItemTitle = payload?.title;
            let workItemType = payload?.type;
            let workItemState = payload?.state;

            console.log('Attempt 1 - Simplified structure:');
            console.log('workItemId:', workItemId);
            console.log('title:', workItemTitle);

            // If not found, try Azure DevOps full webhook structure
            if (!workItemId && payload?.original?.resource) {
              const resource = payload.original.resource;
              workItemId = resource.id;
              workItemTitle = resource.fields?.['System.Title'];
              workItemType = resource.fields?.['System.WorkItemType'];
              workItemState = resource.fields?.['System.State'];

              console.log('Attempt 2 - Azure DevOps original.resource:');
              console.log('workItemId:', workItemId);
              console.log('title:', workItemTitle);
            }

            // If still not found, try direct resource path
            if (!workItemId && payload?.resource) {
              workItemId = payload.resource.id || payload.resource.workItemId;
              workItemTitle = payload.resource.fields?.['System.Title'];
              workItemType = payload.resource.fields?.['System.WorkItemType'];
              workItemState = payload.resource.fields?.['System.State'];

              console.log('Attempt 3 - Direct resource:');
              console.log('workItemId:', workItemId);
              console.log('title:', workItemTitle);
            }

            // Set defaults if still undefined
            workItemId = workItemId || 'Unknown';
            workItemTitle = workItemTitle || 'Unknown';
            workItemType = workItemType || 'Unknown';
            workItemState = workItemState || 'New';

            console.log('======================================');
            console.log('FINAL Extracted Work Item Details:');
            console.log('ID:', workItemId);
            console.log('Title:', workItemTitle);
            console.log('Type:', workItemType);
            console.log('State:', workItemState);
            console.log('======================================');

            const commitSha = '${{ steps.commit.outputs.sha }}';
            const shortSha = '${{ steps.commit.outputs.short_sha }}';
            const commitMessage = '${{ steps.commit.outputs.message }}';
            const commitAuthor = '${{ steps.commit.outputs.author }}';
            const commitUrl = '${{ steps.commit.outputs.url }}';

            const bodyLines = [
              '## 🤖 Test Case Generation with GitHub Copilot',
              '',
              '**A draft Pull Request will be created and GitHub Copilot coding agent will generate comprehensive test cases.**',
              '',
              '**Work Item ID:** ' + workItemId,
              '',
              '## 🧾 Work Item Details',
              '- **ID**: ' + workItemId,
              '- **Title**: ' + workItemTitle,
              '- **Type**: ' + workItemType,
              '- **State**: ' + workItemState,
              '',
              '## 📦 Latest Code Commit',
              '- **Commit SHA**: [' + shortSha + '](' + commitUrl + ')',
              '- **Author**: ' + commitAuthor,
              '- **Message**: ' + commitMessage,
              '',
              '## 🎯 What Will Happen',
              '1. A branch will be automatically created with placeholder test case files',
              '2. A draft Pull Request will be created automatically',
              '3. GitHub Copilot coding agent will be invoked with @copilot mention in the PR',
              '4. Copilot will analyze the work item and generate:',
              '   - Integration validation tests',
              '   - Policy compliance tests',
              '   - End-to-end test scenarios',
              '   - Regression test cases',
              '   - Test execution scripts',
              '5. You can review and interact with Copilot in the PR',
              '6. Once approved, merge the PR',
              '7. Test cases will be attached to Azure DevOps',
              '',
              '## ✅ Success Criteria',
              '- [ ] Branch created with placeholder files',
              '- [ ] Draft PR created with @copilot mention',
              '- [ ] GitHub Copilot coding agent responds in PR',
              '- [ ] Copilot generates comprehensive test cases',
              '- [ ] Minimum 15 test cases across all categories',
              '- [ ] Test execution scripts included',
              '- [ ] Code coverage target: 80%',
              '- [ ] PR reviewed and approved',
              '- [ ] PR merged to main',
              '- [ ] Test cases attached to Azure DevOps work item',
              '',
              '**Triggered automatically from Azure DevOps**',
              '[View Commit](' + commitUrl + ')'
            ];

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧪 Test Cases + Execution for WI #${workItemId} (Commit ${shortSha})`,
              body: bodyLines.join('\n'),
              labels: ['test-generation','test-execution','azure-devops-trigger','copilot-agent']
            });

            console.log('Created tracking issue #', issue.data.number);
            console.log('Issue URL:', issue.data.html_url);

            core.setOutput('issue_number', issue.data.number);
            
            // Assign Copilot coding agent using the correct API
            try {
              // Use raw request to include agent_assignment parameter
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['copilot-swe-agent[bot]'],
                agent_assignment: {
                  target_repo: `${context.repo.owner}/${context.repo.repo}`,
                  base_branch: 'master',
                  custom_instructions: `Generate comprehensive test cases for Work Item #${workItemId}: ${workItemTitle}
            
            Please create:
            1. Integration Validation Tests - Minimum 5 test cases
            2. Policy Compliance Tests - Minimum 3 test cases  
            3. End-to-End Test Scenarios - Minimum 4 test cases
            4. Regression Test Cases - Minimum 3 test cases
            5. Test Execution Scripts - Bash scripts for test automation
            
            Create files in:
            - test-cases/WI-${workItemId}-testcases.md
            - test-cases/WI-${workItemId}-testcases.json
            - test-execution/WI-${workItemId}-test-scripts.sh
            
            Target code coverage: 80% or higher.`,
                  custom_agent: '',
                  model: ''
                }
              });
              console.log('✅ Assigned copilot-swe-agent[bot] to issue #' + issue.data.number);
              console.log('🚀 Copilot coding agent will now start generating test cases!');
            } catch (error) {
              console.error('❌ Failed to assign Copilot coding agent:', error.message);
              console.log('Status:', error.status);
              // Don't throw - continue with workflow
            }
            
            return issue.data.number;

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = '${{ steps.create-issue.outputs.issue_number }}';
            const workItemId = '${{ steps.extract.outputs.work_item_id }}';
            
            console.log('========================================');
            console.log('🎉 WORKFLOW COMPLETE');
            console.log('========================================');
            console.log(`Issue #${issueNumber} created for: WI-${workItemId}`);
            console.log('');
            console.log('🤖 Copilot coding agent has been assigned!');
            console.log('   - Copilot will create its own branch (copilot/...)');
            console.log('   - Copilot will generate test cases');
            console.log('   - Copilot will create a PR');
            console.log('   - Copilot will request your review when done');
            console.log('');
            console.log(`View issue: https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`);
            console.log('========================================');